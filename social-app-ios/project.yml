name: SocialApp
options:
  bundleIdPrefix: com.example.socialapp
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  SocialApp:
    type: application
    platform: iOS
    sources:
      - path: SocialApp
      - path: Generated
  UnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnitTests
    dependencies:
      - target: SocialApp
  UITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: SocialApp